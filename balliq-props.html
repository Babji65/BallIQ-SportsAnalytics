<style>
:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --surface2: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f2f7;
  --muted: #6b7385;
  --accent: #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.1);
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.display { font-family: 'Barlow Condensed', sans-serif; }

/* HEADER */
header {
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px; color: var(--accent); letter-spacing: -0.5px; }
.logo span { color: var(--text); }
.header-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

/* LAYOUT */
.container { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }

/* GAME SELECTOR */
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-bottom: 28px; }
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.15s;
}
.game-card:hover { border-color: var(--border2); background: var(--surface2); }
.game-card.selected { border-color: var(--accent); background: rgba(200,241,53,0.04); }
.game-card.selected::before { background: var(--accent); }
.game-matchup { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 4px; }
.game-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
.game-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; }
.badge-nfl { background: rgba(96,165,250,0.15); color: var(--blue); }
.badge-ncaa { background: rgba(200,241,53,0.12); color: var(--accent); }

/* MAIN AREA */
.main-layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; }

/* PLAYER LIST */
.player-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.filter-tabs { display: flex; gap: 1px; background: var(--bg); border-radius: 6px; padding: 2px; margin-bottom: 0; }
.filter-tab { padding: 5px 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); cursor: pointer; border-radius: 4px; transition: all 0.12s; border: none; background: transparent; }
.filter-tab.active { background: var(--surface2); color: var(--text); }
.player-list { overflow-y: auto; max-height: 520px; }
.player-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.player-item:last-child { border-bottom: none; }
.player-item:hover { background: var(--surface2); }
.player-item.active { background: rgba(200,241,53,0.06); border-left: 2px solid var(--accent); padding-left: 14px; }
.player-avatar { width: 36px; height: 36px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; color: var(--muted); flex-shrink: 0; border: 1px solid var(--border); }
.player-name { font-size: 14px; font-weight: 600; line-height: 1.2; }
.player-pos { font-size: 11px; color: var(--muted); margin-top: 1px; }
.player-edge { margin-left: auto; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; }
.edge-up { color: var(--green); }
.edge-down { color: var(--red); }
.edge-neu { color: var(--amber); }

/* PROPS PANEL */
.props-panel { display: flex; flex-direction: column; gap: 16px; }
.player-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  gap: 20px;
}
.hero-avatar {
  width: 60px; height: 60px; border-radius: 12px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; color: var(--accent);
  border: 1px solid var(--border2);
  flex-shrink: 0;
}
.hero-name { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: 0.02em; line-height: 1; }
.hero-sub { font-size: 13px; color: var(--muted); margin-top: 5px; }
.hero-stats { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
.hero-stat { }
.hs-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.hs-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; }

/* PROP CARDS */
.props-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.prop-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
}
.prop-card:hover { border-color: var(--border2); }
.prop-card.value-bet { border-color: rgba(52,211,153,0.3); }
.prop-card.value-bet::after {
  content: '🔥 VALUE BET';
  position: absolute; top: 10px; right: 10px;
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
  color: var(--green); background: var(--green-dim);
  padding: 3px 7px; border-radius: 4px;
}
.prop-type { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.prop-line-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.prop-line { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; }
.prop-book-odds { font-size: 14px; color: var(--muted); font-weight: 500; }
.prop-direction { display: flex; gap: 8px; margin-bottom: 14px; }
.dir-btn {
  flex: 1; padding: 8px; border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.12s; font-family: 'Barlow', sans-serif;
}
.dir-btn.over.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.dir-btn.under.active { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.dir-btn:hover { border-color: var(--border2); }

/* TREND BAR */
.trend-section { margin-bottom: 12px; }
.trend-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.trend-label span:last-child { font-weight: 600; color: var(--text); }
.trend-bars { display: flex; gap: 4px; align-items: flex-end; height: 40px; }
.trend-bar {
  flex: 1; border-radius: 3px 3px 0 0;
  position: relative; cursor: default;
  transition: opacity 0.1s;
  min-height: 4px;
}
.trend-bar:hover { opacity: 0.8; }
.trend-bar.hit { background: var(--green); }
.trend-bar.miss { background: var(--surface2); border: 1px solid var(--border2); }

/* MATCHUP */
.matchup-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.matchup-label { font-size: 12px; color: var(--muted); flex: 1; }
.matchup-rating { display: flex; gap: 3px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); }
.dot.filled { }

/* EDGE METER */
.edge-row { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
.edge-label { font-size: 12px; color: var(--muted); }
.edge-val { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; }
.verdict-pill { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 4px 10px; border-radius: 5px; }
.vp-bet { background: var(--green-dim); color: var(--green); }
.vp-pass { background: var(--red-dim); color: var(--red); }
.vp-watch { background: var(--amber-dim); color: var(--amber); }

/* EMPTY STATE */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--muted); text-align: center; }
.empty-icon { font-size: 40px; opacity: 0.3; }
.empty-text { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.04em; }
.empty-sub { font-size: 13px; }

/* PLACEHOLDER MSG */
.no-game { grid-column: 1 / -1; padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }
</style>
</head>

let selectedGame = null;
let selectedPlayer = null;
let posFilter = "ALL";

function renderGames() {
  const g = document.getElementById("gameGrid");
  g.innerHTML = DATA.games.map(game => `
    <div class="game-card ${selectedGame === game.id ? 'selected' : ''}" onclick="selectGame(${game.id})">
      <div class="game-matchup">${game.away} @ ${game.home}</div>
      <div class="game-meta">
        <span class="game-badge badge-${game.league === 'NFL' ? 'nfl' : 'ncaa'}">${game.league}</span>
        ${game.time} · ${game.spread}
      </div>
    </div>`).join("");
}

function selectGame(id) {
  selectedGame = id;
  selectedPlayer = null;
  renderGames();
  document.getElementById("mainLayout").style.display = "grid";
  renderPlayerList();
  document.getElementById("propsPanel").innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">👆</div>
      <div class="empty-text">Choose a player</div>
      <div class="empty-sub">Select from the list to see props, trends & edge</div>
    </div>`;
}

function filterPos(pos, btn) {
  posFilter = pos;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayerList();
}

function renderPlayerList() {
  const list = document.getElementById("playerList");
  const players = (DATA.players[selectedGame] || []).filter(p => posFilter === "ALL" || p.pos === posFilter);
  if (!players.length) { list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No ${posFilter} players in this game</div>`; return; }
  list.innerHTML = players.map(p => {
    const e = parseFloat(p.edge);
    const cls = e > 0 ? "edge-up" : e < 0 ? "edge-down" : "edge-neu";
    return `<div class="player-item ${selectedPlayer === p.id ? 'active' : ''}" onclick="selectPlayer('${p.id}')">
      <div class="player-avatar">${p.initials}</div>
      <div>
        <div class="player-name">${p.name}</div>
        <div class="player-pos">${p.pos} · ${p.team}</div>
      </div>
      <div class="player-edge ${cls}">${p.edge}%</div>
    </div>`;
  }).join("");
}

function selectPlayer(id) {
  selectedPlayer = id;
  renderPlayerList();
  const player = Object.values(DATA.players).flat().find(p => p.id === id);
  if (!player) return;
  renderProps(player);
}

function renderProps(player) {
  const panel = document.getElementById("propsPanel");
  const isQB = player.pos === "QB";
  const seasonStats = isQB
    ? `<div class="hero-stat"><div class="hs-label">Avg Pass Yds</div><div class="hs-val">${player.season.avg1}</div></div>
       <div class="hero-stat"><div class="hs-label">Avg TDs</div><div class="hs-val">${player.season.avg2}</div></div>
       <div class="hero-stat"><div class="hs-label">Comp %</div><div class="hs-val">${player.season.pct}%</div></div>`
    : `<div class="hero-stat"><div class="hs-label">Avg Rec Yds</div><div class="hs-val">${player.season.avg1}</div></div>
       <div class="hero-stat"><div class="hs-label">Avg TDs</div><div class="hs-val">${player.season.avg2}</div></div>`;

  const propCards = player.props.map(prop => {
    const maxTrend = Math.max(...prop.trend);
    const bars = prop.trend.map((v, i) => {
      const pct = Math.round((v / maxTrend) * 100);
      const hit = isQB
        ? (prop.type.includes("Rush") ? v > prop.line : v > prop.line)
        : v > prop.line;
      return `<div class="trend-bar ${hit ? 'hit' : 'miss'}" style="height:${pct}%" title="${v}"></div>`;
    }).join("");

    const dotsFilled = prop.matchupRating;
    const dots = Array.from({length:5}, (_,i) => {
      const colors = ['#f87171','#fb923c','#fbbf24','#34d399','#4ade80'];
      return `<div class="dot" style="${i < dotsFilled ? `background:${colors[dotsFilled-1]}` : ''}"></div>`;
    }).join("");

    const edgeColor = prop.edge > 3 ? "var(--green)" : prop.edge > 0 ? "var(--amber)" : "var(--red)";
    const verdictClass = prop.verdict === "bet" ? "vp-bet" : prop.verdict === "pass" ? "vp-pass" : "vp-watch";
    const verdictText = prop.verdict === "bet" ? "BET IT" : prop.verdict === "pass" ? "PASS" : "WATCH";
    const isValue = prop.verdict === "bet" && prop.edge > 4;

    return `<div class="prop-card ${isValue ? 'value-bet' : ''}">
      <div class="prop-type">${prop.type}</div>
      <div class="prop-line-row">
        <div class="prop-line">${prop.line}</div>
        <div class="prop-book-odds">O ${prop.overOdds > 0 ? '+' : ''}${prop.overOdds} / U ${prop.underOdds > 0 ? '+' : ''}${prop.underOdds}</div>
      </div>
      <div class="prop-direction">
        <button class="dir-btn over" onclick="this.classList.toggle('active');this.parentElement.querySelector('.under').classList.remove('active')">▲ OVER</button>
        <button class="dir-btn under" onclick="this.classList.toggle('active');this.parentElement.querySelector('.over').classList.remove('active')">▼ UNDER</button>
      </div>
      <div class="trend-section">
        <div class="trend-label"><span>Last 10 games</span><span>${prop.hitPct}% hit rate</span></div>
        <div class="trend-bars">${bars}</div>
      </div>
      <div class="matchup-row">
        <div class="matchup-label">Matchup · ${prop.defRank}</div>
        <div class="matchup-rating">${dots}</div>
      </div>
      <div class="edge-row">
        <div>
          <div class="edge-label">Model edge</div>
          <div class="edge-val" style="color:${edgeColor}">${prop.edge > 0 ? '+' : ''}${prop.edge}%</div>
        </div>
        <div class="verdict-pill ${verdictClass}">${verdictText}</div>
      </div>
    </div>`;
  }).join("");

  panel.innerHTML = `
    <div class="player-hero">
      <div class="hero-avatar">${player.initials}</div>
      <div>
        <div class="hero-name">${player.name}</div>
        <div class="hero-sub">${player.pos} · ${player.team}</div>
        <div class="hero-stats">${seasonStats}</div>
      </div>
    </div>
    <div class="props-grid">${propCards}</div>`;
}

renderGames();
</script>
</body>
</html>
