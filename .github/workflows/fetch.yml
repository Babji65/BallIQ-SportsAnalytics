name: Fetch sports data

on:
  schedule:
    # Runs every 6 hours — adjust as needed
    # During NFL/NCAAF season you may want every 2 hours on game days
    - cron: '0 */6 * * *'

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "balliq-bot"
          git config user.email "bot@balliq.org"
          git add data.json
          # Only commit if data.json actually changed
          git diff --cached --quiet || git commit -m "chore: update data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
