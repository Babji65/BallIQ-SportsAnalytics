<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balliq — Player Props Research</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f2f7;--muted:#6b7385;--accent:#c8f135;
  --green:#34d399;--green-dim:rgba(52,211,153,0.12);
  --red:#f87171;--red-dim:rgba(248,113,113,0.12);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);
  --blue:#60a5fa;--gold:#f59e0b;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
header{padding:14px 28px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;color:var(--accent);letter-spacing:-0.5px;}
.logo span{color:var(--text);}
.nav-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;margin-left:8px;}
.nav-tab{padding:6px 16px;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-radius:6px;transition:all 0.12s;border:none;background:transparent;font-family:'Barlow Condensed',sans-serif;}
.nav-tab.active{background:var(--surface2);color:var(--text);}
.updated-tag{font-size:11px;color:var(--muted);margin-left:auto;}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--muted);}
.spinner{width:34px;height:34px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CONTAINER */
.container{max-width:1200px;margin:0 auto;padding:24px 28px;}
.page{display:none;}.page.active{display:block;}
.section-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

/* ── PICKS PAGE ── */
.picks-header{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.ph-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.ph-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.ph-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;}

.tier-section{margin-bottom:28px;}
.tier-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.tier-badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.1em;padding:4px 12px;border-radius:5px;}
.tier-ELITE{background:rgba(245,158,11,0.15);color:var(--gold);border:1px solid rgba(245,158,11,0.3);}
.tier-STRONG{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,0.3);}
.tier-LEAN{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(251,191,36,0.3);}
.tier-desc{font-size:12px;color:var(--muted);}

.pick-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;display:grid;grid-template-columns:40px 1fr auto;gap:16px;align-items:start;transition:border-color 0.15s;}
.pick-card:hover{border-color:var(--border2);}
.pick-card.tier-ELITE{border-left:3px solid var(--gold);}
.pick-card.tier-STRONG{border-left:3px solid var(--green);}
.pick-card.tier-LEAN{border-left:3px solid var(--amber);}

.pick-rank{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--muted);text-align:center;padding-top:2px;}
.pick-rank.r1{color:var(--gold);}
.pick-rank.r2{color:#94a3b8;}
.pick-rank.r3{color:#b45309;}

.pick-body{}
.pick-player{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.02em;line-height:1;}
.pick-sub{font-size:12px;color:var(--muted);margin-top:3px;margin-bottom:10px;}
.pick-prop{font-size:15px;font-weight:600;margin-bottom:8px;}
.pick-prop span{color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;}

.pick-reasons{display:flex;flex-direction:column;gap:3px;}
.reason-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.reason-item::before{content:'→';color:var(--accent);font-size:10px;flex-shrink:0;}

.pick-metrics{display:flex;flex-direction:column;gap:8px;align-items:flex-end;min-width:120px;}
.metric-chip{text-align:right;}
.mc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
.mc-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;}

.conf-bar{width:80px;height:5px;background:var(--surface2);border-radius:3px;margin-top:4px;overflow:hidden;}
.conf-fill{height:100%;border-radius:3px;}

.grade-badge{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.grade-S{background:rgba(245,158,11,0.15);color:var(--gold);}
.grade-A{background:var(--green-dim);color:var(--green);}
.grade-B{background:var(--amber-dim);color:var(--amber);}
.grade-C{background:rgba(96,165,250,0.1);color:var(--blue);}
.grade-D{background:var(--red-dim);color:var(--red);}

.pick-weather{font-size:11px;color:var(--amber);margin-top:6px;display:flex;align-items:center;gap:4px;}

.no-picks{padding:48px;text-align:center;color:var(--muted);}
.no-picks-icon{font-size:40px;opacity:0.3;margin-bottom:12px;}
.no-picks-text{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;}

/* ── RESEARCH PAGE ── */
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:22px;}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 15px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background 0.15s;}
.game-card:hover{border-color:var(--border2);background:var(--surface2);}
.game-card.selected{border-color:var(--accent);background:rgba(200,241,53,0.04);}
.game-card.selected::before{background:var(--accent);}
.game-matchup{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px;}
.game-meta{font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.game-badge{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:2px 7px;border-radius:4px;}
.badge-NFL{background:rgba(96,165,250,0.15);color:var(--blue);}
.badge-NCAAF{background:rgba(200,241,53,0.12);color:var(--accent);}

.weather-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 15px;margin-bottom:16px;display:flex;align-items:center;gap:20px;font-size:13px;color:var(--muted);}
.wx-val{color:var(--text);font-weight:600;margin-left:4px;}
.wx-warn{color:var(--amber);font-weight:600;}

.main-layout{display:grid;grid-template-columns:245px 1fr;gap:16px;}
.player-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.panel-header{padding:12px 14px;border-bottom:1px solid var(--border);}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
.filter-tabs{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:2px;}
.filter-tab{padding:5px 9px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-radius:4px;transition:all 0.12s;border:none;background:transparent;}
.filter-tab.active{background:var(--surface2);color:var(--text);}
.player-list{overflow-y:auto;max-height:560px;}
.player-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;}
.player-item:last-child{border-bottom:none;}
.player-item:hover{background:var(--surface2);}
.player-item.active{background:rgba(200,241,53,0.06);border-left:2px solid var(--accent);padding-left:12px;}
.player-avatar{width:33px;height:33px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0;border:1px solid var(--border);}
.player-name{font-size:13px;font-weight:600;line-height:1.2;}
.player-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.player-edge{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;}
.edge-up{color:var(--green);}.edge-dn{color:var(--red);}.edge-neu{color:var(--amber);}
.inj-dot{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;margin-left:4px;vertical-align:middle;}

.props-panel{display:flex;flex-direction:column;gap:12px;}
.player-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:flex-start;gap:16px;}
.hero-avatar{width:52px;height:52px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:var(--accent);border:1px solid var(--border2);flex-shrink:0;}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;line-height:1;}
.hero-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.hero-stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;}
.hs-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px;}
.hs-val{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;}

.props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;}
.prop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;}
.prop-card.value-bet{border-color:rgba(52,211,153,0.35);}
.vb-tag{position:absolute;top:9px;right:9px;font-size:9px;font-weight:800;letter-spacing:0.1em;color:var(--green);background:var(--green-dim);padding:2px 6px;border-radius:4px;}
.prop-type{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.prop-line-area{display:flex;align-items:baseline;gap:8px;margin-bottom:9px;}
.prop-line{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;cursor:pointer;border-bottom:1px dashed var(--muted);}
.prop-line:hover{color:var(--accent);border-color:var(--accent);}
.line-hint{font-size:11px;color:var(--muted);}
.odds-row{display:flex;gap:6px;margin-bottom:10px;}
.odds-input-wrap{flex:1;}
.odds-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
.odds-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;font-size:13px;font-weight:600;color:var(--text);font-family:'Barlow Condensed',sans-serif;}
.odds-input:focus{outline:none;border-color:var(--accent);}
.dir-row{display:flex;gap:6px;margin-bottom:10px;}
.dir-btn{flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.12s;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.04em;}
.dir-btn.over.picked{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.dir-btn.under.picked{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.trend-label-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;}
.trend-label-row span:last-child{font-weight:600;color:var(--text);}
.trend-bars{display:flex;gap:3px;align-items:flex-end;height:36px;margin-bottom:9px;}
.trend-bar{flex:1;border-radius:2px 2px 0 0;min-height:4px;position:relative;}
.trend-bar.hit{background:var(--green);}.trend-bar.miss{background:var(--surface2);border:1px solid var(--border2);}
.trend-bar .tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-size:10px;white-space:nowrap;color:var(--text);z-index:10;}
.trend-bar:hover .tip{display:block;}
.matchup-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.matchup-label{font-size:11px;color:var(--muted);flex:1;}
.dots{display:flex;gap:3px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);}
.model-row{background:var(--surface2);border-radius:7px;padding:8px 10px;margin-bottom:9px;display:flex;gap:16px;flex-wrap:wrap;}
.mr-item{}.mr-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.mr-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;}
.edge-footer{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--border);}
.edge-val{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;}
.ev-row{display:flex;align-items:center;gap:5px;margin-top:2px;}
.ev-label{font-size:11px;color:var(--muted);}
.ev-val{font-size:12px;font-weight:600;}
.verdict-pill{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:4px 11px;border-radius:6px;}
.vp-bet{background:var(--green-dim);color:var(--green);}
.vp-pass{background:var(--red-dim);color:var(--red);}
.vp-watch{background:var(--amber-dim);color:var(--amber);}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px;gap:10px;color:var(--muted);text-align:center;}
.empty-icon{font-size:34px;opacity:0.3;}
.empty-text{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;}
.empty-sub{font-size:13px;}
.injury-banner{background:var(--red-dim);border:1px solid rgba(248,113,113,0.25);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--red);margin-bottom:8px;}
</style>
</head>
<body>

<header>
  <div class="logo">ball<span>iq</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('picks',this)">🏆 Top Picks</button>
    <button class="nav-tab" onclick="showPage('research',this)">🔍 Research</button>
  </div>
  <span class="updated-tag" id="updatedTag">Loading…</span>
</header>

<div class="loader" id="loader"><div class="spinner"></div><div style="font-size:13px;">Loading data…</div></div>
<div id="appRoot" style="display:none;">

  <!-- ── PICKS PAGE ── -->
  <div class="page active" id="page-picks">
    <div class="container">
      <div class="picks-header" id="picksHeader"></div>
      <div id="picksContent"></div>
    </div>
  </div>

  <!-- ── RESEARCH PAGE ── -->
  <div class="page" id="page-research">
    <div class="container">
      <div class="section-label">Select a game</div>
      <div class="game-grid" id="gameGrid"></div>
      <div id="weatherStrip"></div>
      <div class="main-layout" id="mainLayout" style="display:none;">
        <div class="player-panel">
          <div class="panel-header">
            <div class="panel-title">Players</div>
            <div class="filter-tabs">
              <button class="filter-tab active" onclick="filterPos('ALL',this)">All</button>
              <button class="filter-tab" onclick="filterPos('QB',this)">QB</button>
              <button class="filter-tab" onclick="filterPos('WR',this)">WR</button>
              <button class="filter-tab" onclick="filterPos('RB',this)">RB</button>
              <button class="filter-tab" onclick="filterPos('TE',this)">TE</button>
            </div>
          </div>
          <div class="player-list" id="playerList"></div>
        </div>
        <div class="props-panel" id="propsPanel">
          <div class="empty-state"><div class="empty-icon">👆</div><div class="empty-text">Choose a player</div><div class="empty-sub">Select from the list to see props, trends & model scores</div></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let DATA = null, PICKS = null;
let selGameIdx = null, selPlayerId = null, posFilter = 'ALL';
const userOdds = {};

// ── load ───────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [dRes, pRes] = await Promise.all([
      fetch('data.json?v='+Date.now()),
      fetch('picks.json?v='+Date.now()),
    ]);
    DATA  = dRes.ok  ? await dRes.json()  : null;
    PICKS = pRes.ok  ? await pRes.json()  : null;

    document.getElementById('loader').style.display = 'none';
    document.getElementById('appRoot').style.display = 'block';

    const src = DATA || PICKS;
    if (src) {
      const d = new Date(src.updated_at || src.generated_at);
      document.getElementById('updatedTag').textContent =
        'Updated ' + d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
    }

    if (PICKS) renderPicks();
    if (DATA)  renderGames();
  } catch(e) {
    document.getElementById('loader').innerHTML =
      `<div style="padding:40px;text-align:center;color:var(--red);">Could not load data — run fetch_data.py first.<br><small>${e.message}</small></div>`;
  }
}

// ── page nav ───────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── PICKS ──────────────────────────────────────────────────────────────────
function renderPicks() {
  const s = PICKS.summary || {};
  document.getElementById('picksHeader').innerHTML = `
    <div class="ph-card"><div class="ph-label">Total Picks</div><div class="ph-val">${PICKS.picks_count}</div></div>
    <div class="ph-card"><div class="ph-label" style="color:var(--gold)">Elite</div><div class="ph-val" style="color:var(--gold)">${s.elite_count||0}</div></div>
    <div class="ph-card"><div class="ph-label" style="color:var(--green)">Avg EV</div><div class="ph-val" style="color:var(--green)">+${s.avg_ev||0}%</div></div>
    <div class="ph-card"><div class="ph-label">Avg Confidence</div><div class="ph-val">${s.avg_conf||0}</div></div>`;

  const picks = PICKS.picks || [];
  if (!picks.length) {
    document.getElementById('picksContent').innerHTML = `
      <div class="no-picks"><div class="no-picks-icon">📭</div>
      <div class="no-picks-text">No picks yet — run the pipeline first</div></div>`;
    return;
  }

  const tiers = ['ELITE','STRONG','LEAN'];
  const tierDesc = {
    ELITE:  'Highest conviction — max edge, strong hit rate',
    STRONG: 'Solid plays — positive EV with good consistency',
    LEAN:   'Worth monitoring — small play or wait for line move',
  };

  let html = '';
  for (const tier of tiers) {
    const tierPicks = picks.filter(p => p.tier === tier);
    if (!tierPicks.length) continue;
    html += `<div class="tier-section">
      <div class="tier-header">
        <span class="tier-badge tier-${tier}">${tier}</span>
        <span class="tier-desc">${tierDesc[tier]}</span>
      </div>`;
    for (const pick of tierPicks) {
      const rankCls = pick.rank===1?'r1':pick.rank===2?'r2':pick.rank===3?'r3':'';
      const confColor = pick.confidence>=65?'var(--green)':pick.confidence>=40?'var(--amber)':'var(--red)';
      const evColor   = pick.ev_pct>0?'var(--green)':'var(--red)';
      const wx = pick.weather;
      const wxWarn = wx && (wx.wind_mph>15||wx.precip_in>0.1)
        ? `<div class="pick-weather">⚠ ${wx.wind_mph}mph wind / ${wx.precip_in}" rain may affect this prop</div>` : '';
      const injBadge = pick.injury_status && pick.injury_status!=='Active'
        ? `<span style="font-size:11px;color:var(--red);margin-left:6px;">⚠ ${pick.injury_status}</span>` : '';
      const reasons = (pick.reasons||[]).map(r =>
        `<div class="reason-item">${r}</div>`).join('');
      const kelly = pick.kelly_pct > 0
        ? `<div class="metric-chip"><div class="mc-label">Kelly stake</div><div class="mc-val" style="color:var(--accent)">${pick.kelly_pct}%</div></div>` : '';

      html += `<div class="pick-card tier-${tier}">
        <div class="pick-rank ${rankCls}">#${pick.rank}</div>
        <div class="pick-body">
          <div class="pick-player">${pick.player_name}${injBadge}</div>
          <div class="pick-sub">${pick.player_pos} · ${pick.player_team} · ${pick.game}</div>
          <div class="pick-prop">
            ${pick.prop_type} <span>${pick.direction} ${pick.line}</span>
            <span style="font-size:13px;color:var(--muted);font-weight:400;margin-left:4px;">@ ${pick.over_odds>0?'+':''}${pick.over_odds}</span>
          </div>
          <div class="pick-reasons">${reasons}</div>
          ${wxWarn}
        </div>
        <div class="pick-metrics">
          <div class="grade-badge grade-${pick.grade}">${pick.grade}</div>
          <div class="metric-chip" style="margin-top:6px;">
            <div class="mc-label">Confidence</div>
            <div class="mc-val" style="color:${confColor}">${pick.confidence}</div>
            <div class="conf-bar"><div class="conf-fill" style="width:${pick.confidence}%;background:${confColor};"></div></div>
          </div>
          <div class="metric-chip">
            <div class="mc-label">Model EV</div>
            <div class="mc-val" style="color:${evColor}">${pick.ev_pct>0?'+':''}${pick.ev_pct}%</div>
          </div>
          <div class="metric-chip">
            <div class="mc-label">Hit rate</div>
            <div class="mc-val">${pick.hit_rate}%</div>
          </div>
          ${kelly}
        </div>
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('picksContent').innerHTML = html;
}

// ── RESEARCH ───────────────────────────────────────────────────────────────
function renderGames() {
  if (!DATA) return;
  document.getElementById('gameGrid').innerHTML = DATA.games.map((g,i) => `
    <div class="game-card ${selGameIdx===i?'selected':''}" onclick="selectGame(${i})">
      <div class="game-matchup">${g.away} @ ${g.home}</div>
      <div class="game-meta">
        <span class="game-badge badge-${g.league}">${g.league}</span>
        ${g.date}${g.spread?' · '+g.spread:''}
      </div>
    </div>`).join('');
}

function selectGame(idx) {
  selGameIdx=idx; selPlayerId=null;
  renderGames();
  document.getElementById('mainLayout').style.display='grid';
  renderPlayerList();
  document.getElementById('propsPanel').innerHTML=`<div class="empty-state"><div class="empty-icon">👆</div><div class="empty-text">Choose a player</div><div class="empty-sub">Select from the list</div></div>`;
  const g=DATA.games[idx];
  const wx=g.weather;
  let strip='';
  if(wx){
    const ww=wx.wind_mph>15,rw=wx.precip_in>0.1;
    strip=`<div class="weather-strip">
      <span>🌡 Temp <span class="wx-val">${wx.temp_f}°F</span></span>
      <span>💨 Wind <span class="${ww?'wx-warn':'wx-val'}">${wx.wind_mph}mph${ww?' ⚠':''}</span></span>
      <span>🌧 Rain <span class="${rw?'wx-warn':'wx-val'}">${wx.precip_in}"${rw?' ⚠':''}</span></span>
    </div>`;
  }
  document.getElementById('weatherStrip').innerHTML=strip;
}

function filterPos(pos,btn){
  posFilter=pos;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayerList();
}

function renderPlayerList(){
  const list=document.getElementById('playerList');
  const players=(DATA.games[selGameIdx]?.players||[]).filter(p=>posFilter==='ALL'||p.pos===posFilter);
  if(!players.length){list.innerHTML=`<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">No ${posFilter} players</div>`;return;}
  list.innerHTML=players.map(p=>{
    const e=parseFloat(p.overall_edge);
    const cls=e>0?'edge-up':e<0?'edge-dn':'edge-neu';
    const inj=p.injury_status&&p.injury_status!=='Active'&&p.injury_status!=='Full';
    return `<div class="player-item ${selPlayerId===p.id?'active':''}" onclick="selectPlayer('${p.id}')">
      <div class="player-avatar">${p.initials}</div>
      <div><div class="player-name">${p.name}${inj?'<span class="inj-dot"></span>':''}</div>
      <div class="player-sub">${p.pos} · ${p.team}</div></div>
      <div class="player-edge ${cls}">${p.overall_edge}%</div>
    </div>`;
  }).join('');
}

function selectPlayer(id){
  selPlayerId=id; renderPlayerList();
  const player=DATA.games[selGameIdx]?.players.find(p=>p.id==id);
  if(player) renderProps(player);
}

function dotColor(r){return['#f87171','#fb923c','#fbbf24','#34d399','#4ade80'][Math.min(Math.max(r-1,0),4)];}

function renderProps(player){
  const panel=document.getElementById('propsPanel');
  const avgs=player.season_avgs||{};
  const injBanner=(player.injury_status&&player.injury_status!=='Active')
    ?`<div class="injury-banner">⚠ ${player.name} — ${player.injury_status}${player.injury_detail?': '+player.injury_detail:''}</div>`:'';
  const statItems=[];
  if(avgs.pass_yds)statItems.push(['Avg Pass Yds',avgs.pass_yds]);
  if(avgs.pass_td)statItems.push(['Avg TDs',avgs.pass_td]);
  if(avgs.rec_yds)statItems.push(['Avg Rec Yds',avgs.rec_yds]);
  if(avgs.rec)statItems.push(['Avg Rec',avgs.rec]);
  if(avgs.rush_yds)statItems.push(['Avg Rush Yds',avgs.rush_yds]);
  const statsHtml=statItems.slice(0,3).map(([l,v])=>`<div><div class="hs-label">${l}</div><div class="hs-val">${v}</div></div>`).join('');

  const cards=player.props.map((prop,i)=>{
    const key=`${player.id}_${i}`;
    const savedOver=userOdds[key+'_over']||'';
    const savedUnder=userOdds[key+'_under']||'';
    const savedPick=userOdds[key+'_pick']||'';
    const savedLine=userOdds[key+'_line']||prop.line;
    const maxVal=Math.max(...prop.trend,1);
    const bars=prop.trend.map(v=>{
      const h=Math.round((v/maxVal)*100);
      const hit=v>parseFloat(savedLine);
      return `<div class="trend-bar ${hit?'hit':'miss'}" style="height:${h}%"><span class="tip">${v}</span></div>`;
    }).join('');
    const hits=prop.trend.filter(v=>v>parseFloat(savedLine)).length;
    const hitRate=Math.round(hits/prop.trend.length*100);
    const rating=prop.matchup_rating||3;
    const dots=Array.from({length:5},(_,di)=>`<div class="dot" style="${di<rating?'background:'+dotColor(rating)+';border-color:'+dotColor(rating):''}"></div>`).join('');

    // EV calc if user entered odds
    let evHtml='';
    if(savedOver){
      const p2=hitRate/100;
      const n=parseFloat(savedOver);
      const imp=n<0?(-n/(-n+100)):(100/(n+100));
      const pay=n>0?n/100:100/Math.abs(n);
      const ev=p2*pay-(1-p2)*1;
      const evPct=(ev*100).toFixed(1);
      const c=parseFloat(evPct)>0?'var(--green)':'var(--red)';
      evHtml=`<div class="ev-row"><span class="ev-label">EV</span><span class="ev-val" style="color:${c}">${parseFloat(evPct)>0?'+':''}${evPct}% per $100</span></div>`;
    }

    const confidence=prop.confidence||0;
    const confColor=confidence>=65?'var(--green)':confidence>=40?'var(--amber)':'var(--red)';
    const eColor=prop.ev_pct>3?'var(--green)':prop.ev_pct>0?'var(--amber)':'var(--red)';
    const isValue=prop.verdict==='bet'&&(prop.confidence||0)>=65;
    const vClass=prop.verdict==='bet'?'vp-bet':prop.verdict==='pass'?'vp-pass':'vp-watch';
    const vText=prop.verdict==='bet'?'BET IT':prop.verdict==='pass'?'PASS':'WATCH';
    const reasonsHtml=(prop.reasons||[]).map(r=>`<div style="font-size:11px;color:var(--muted);margin-top:2px;">→ ${r}</div>`).join('');

    return `<div class="prop-card ${isValue?'value-bet':''}">
      ${isValue?'<div class="vb-tag">🔥 VALUE BET</div>':''}
      <div class="prop-type">${prop.type}</div>
      <div class="prop-line-area">
        <div class="prop-line" onclick="editLine('${player.id}',${i})">${savedLine}</div>
        <span class="line-hint">tap to edit</span>
      </div>
      <div class="odds-row">
        <div class="odds-input-wrap">
          <div class="odds-label">Over odds</div>
          <input class="odds-input" type="text" placeholder="-110" value="${savedOver}"
            oninput="saveOdds('${player.id}',${i},'over',this.value)">
        </div>
        <div class="odds-input-wrap">
          <div class="odds-label">Under odds</div>
          <input class="odds-input" type="text" placeholder="-110" value="${savedUnder}"
            oninput="saveOdds('${player.id}',${i},'under',this.value)">
        </div>
      </div>
      <div class="dir-row">
        <button class="dir-btn over ${savedPick==='over'?'picked':''}" onclick="pickDir('${player.id}',${i},'over')">▲ OVER</button>
        <button class="dir-btn under ${savedPick==='under'?'picked':''}" onclick="pickDir('${player.id}',${i},'under')">▼ UNDER</button>
      </div>
      <div class="trend-label-row"><span>Last ${prop.trend.length} games</span><span>${hitRate}% hit rate</span></div>
      <div class="trend-bars">${bars}</div>
      <div class="matchup-row"><span class="matchup-label">Matchup rating</span><div class="dots">${dots}</div></div>
      ${prop.confidence!=null?`<div class="model-row">
        <div class="mr-item"><div class="mr-label">Confidence</div><div class="mr-val" style="color:${confColor}">${confidence}</div></div>
        <div class="mr-item"><div class="mr-label">Model prob</div><div class="mr-val">${prop.model_prob!=null?Math.round(prop.model_prob*100)+'%':'—'}</div></div>
        <div class="mr-item"><div class="mr-label">Consistency</div><div class="mr-val">${prop.consistency!=null?Math.round(prop.consistency*100)+'%':'—'}</div></div>
      </div>`:''}
      ${reasonsHtml?`<div style="margin-bottom:9px;">${reasonsHtml}</div>`:''}
      <div class="edge-footer">
        <div>
          <div style="font-size:11px;color:var(--muted);">Model EV</div>
          <div class="edge-val" style="color:${eColor}">${prop.ev_pct!=null?(prop.ev_pct>0?'+':'')+prop.ev_pct+'%':'—'}</div>
          ${evHtml}
        </div>
        <div class="verdict-pill ${vClass}">${vText}</div>
      </div>
    </div>`;
  }).join('');

  panel.innerHTML=`${injBanner}
    <div class="player-hero">
      <div class="hero-avatar">${player.initials}</div>
      <div><div class="hero-name">${player.name}</div>
      <div class="hero-sub">${player.pos} · ${player.team}${player.jersey?' · #'+player.jersey:''}</div>
      <div class="hero-stats">${statsHtml}</div></div>
    </div>
    <div class="props-grid">${cards}</div>`;
}

function saveOdds(pid,idx,side,val){
  userOdds[`${pid}_${idx}_${side}`]=val;
  const p=DATA.games[selGameIdx]?.players.find(p=>p.id==pid);
  if(p)renderProps(p);
}
function pickDir(pid,idx,dir){
  const key=`${pid}_${idx}_pick`;
  userOdds[key]=userOdds[key]===dir?'':dir;
  const p=DATA.games[selGameIdx]?.players.find(p=>p.id==pid);
  if(p)renderProps(p);
}
function editLine(pid,idx){
  const player=DATA.games[selGameIdx]?.players.find(p=>p.id==pid);
  if(!player)return;
  const cur=userOdds[`${pid}_${idx}_line`]||player.props[idx].line;
  const val=prompt(`Edit line for ${player.props[idx].type}:`,cur);
  if(val!==null&&!isNaN(parseFloat(val))){
    userOdds[`${pid}_${idx}_line`]=parseFloat(val);
    renderProps(player);
  }
}

loadAll();
</script>
</body>
</html>
